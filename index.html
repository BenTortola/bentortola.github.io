<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
<style>
    body {
        background-color: #001f3f;   /* Navy */
        color: white;
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    h1, h2, h3 {
        color: #7FDBFF;  /* Light blue */
    }

    nav a {
        color: #39CCCC;  /* Cyan */
        text-decoration: none;
        font-weight: bold;
    }

    nav a:hover {
        color: #FFD700;  /* Gold */
    }

    table {
        background-color: #f0f0f0;  /* Light gray */
        color: black;
        border-collapse: collapse;
    }

    table, th, td {
        border: 1px solid black;
        padding: 8px;
    }

    img {
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<h1>Ben Tortola</h1>

<nav>
    <a href="index.html">Home</a> |
    <a href="gallery.html">Gallery</a> |
    <a href="about.html">About</a>
</nav>

<p>Change Theme:</p>

<button onclick="darkTheme()">Dark Theme</button>
<button onclick="lightTheme()">Light Theme</button>
<button onclick="blueTheme()">Blue Theme</button>

<p>Welcome to my animation website. Here you can explore my creative work and projects.</p>

<a href="gallery.html">
    <img src="images/image1.jpg" alt="Animation artwork" width="400" height="250" onclick="imageMessage()">
</a>

<p>Artwork is not made by me, simply a placeholder until I present my own work.</p>

<p>
Visit my favorite animation studio:
<a href="https://www.disney.com" target="_blank" style="color: cyan;">Disney</a>
</p>

<script>
// Apply saved theme when page loads
window.onload = function() {
    let savedTheme = localStorage.getItem("theme");

    if (savedTheme === "dark") {
        darkTheme();
    } else if (savedTheme === "light") {
        lightTheme();
    } else if (savedTheme === "blue") {
        blueTheme();
    }

    // Notification
    alert("Welcome to my animation website!");

    // Conditional
    let likesAnimation = prompt("Do you like animation? Type yes or no.");

    if (likesAnimation === "yes") {
        alert("That’s great! Welcome to my animation website.");
    } else {
        alert("Thanks for visiting my website anyway!");
    }
};

// Color Themes
function darkTheme() {
    document.body.style.backgroundColor = "#001f3f";
    document.body.style.color = "white";
    localStorage.setItem("theme", "dark");
}

function lightTheme() {
    document.body.style.backgroundColor = "#f0f0f0";
    document.body.style.color = "black";
    localStorage.setItem("theme", "light");
}

function blueTheme() {
    document.body.style.backgroundColor = "#0074D9";
    document.body.style.color = "white";
    localStorage.setItem("theme", "blue");
}

// Event Handler
function imageMessage() {
    alert("This image opens the gallery page.");
}
</script>

</body>
</html>
